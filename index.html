<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Meets AI Podcast</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f7e9ef, #efe7ff);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 90%;
  max-width: 520px;
  background: rgba(255,255,255,.92);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 20px 50px rgba(0,0,0,.15);
  text-align: center;
}

h1 {
  margin: 0 0 8px;
  font-size: 28px;
}

.subtitle {
  color: #777;
  margin-bottom: 22px;
}

.status {
  margin: 18px 0;
  font-weight: bold;
  line-height: 1.6;
}

audio {
  width: 100%;
  margin-top: 16px;
}

button {
  margin-top: 18px;
  padding: 13px 22px;
  border: none;
  border-radius: 999px;
  background: #111;
  color: white;
  font-size: 16px;
}

.list {
  margin-top: 22px;
  text-align: left;
}

.item {
  padding: 12px 14px;
  border-radius: 14px;
  background: #f6f1f4;
  margin-bottom: 8px;
  font-size: 14px;
}

.item.active {
  background: #111;
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <h1>🎙 Beauty Meets AI</h1>
  <div id="title" class="subtitle">載入中...</div>

  <div id="status" class="status">準備播放器中...</div>

  <audio id="player" controls></audio>

  <button onclick="startPlay()">▶ 播放本集</button>

  <div id="list" class="list"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwecSvaVQPVmHBvpv8vCA70fkdcDQbeLUoB6HLUcmt3QrSNBkBDW2Yu1R7TWTuLWVlNgg/exec";

let playlist = [];
let index = 0;

const player = document.getElementById("player");
const title = document.getElementById("title");
const status = document.getElementById("status");
const list = document.getElementById("list");

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const callback = "jsonp_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

    window[callback] = function(data) {
      resolve(data);
      script.remove();
      delete window[callback];
    };

    const script = document.createElement("script");
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callback;
    script.onerror = reject;
    document.body.appendChild(script);
  });
}

async function loadPlaylist() {
  const data = await jsonp(APPS_SCRIPT_URL + "?action=playlist");

  title.innerHTML = data.title || "Beauty Meets AI";
  playlist = data.episodes || [];

  if (playlist.length === 0) {
    status.innerHTML = "目前沒有找到音檔";
    return;
  }

  status.innerHTML = "已載入 " + playlist.length + " 段音檔";

  list.innerHTML = playlist.map((ep, i) => `
    <div class="item" id="item-${i}">
      ${i + 1}. ${ep.name}
    </div>
  `).join("");
}

async function loadTrack(autoPlay) {
  const episode = playlist[index];

  document.querySelectorAll(".item").forEach(el => el.classList.remove("active"));
  const activeItem = document.getElementById("item-" + index);
  if (activeItem) activeItem.classList.add("active");

  status.innerHTML =
    "🎧 載入音檔中，稍等一下呦～<br>" +
    episode.name + "（" + (index + 1) + "/" + playlist.length + "）";

  const audio = await jsonp(
    APPS_SCRIPT_URL + "?action=audio&fileId=" + encodeURIComponent(episode.fileId)
  );

  player.src = "data:" + audio.mimeType + ";base64," + audio.base64;
  player.load();

  status.innerHTML =
    "🎙️ 正在播放：<br>" +
    episode.name + "（" + (index + 1) + "/" + playlist.length + "）";

  if (autoPlay) {
    player.play();
  }
}

function startPlay() {
  if (!playlist.length) return;
  index = 0;
  loadTrack(true);
}

player.addEventListener("ended", function() {
  index++;

  if (index < playlist.length) {
    loadTrack(true);
  } else {
    status.innerHTML = "本集播放完畢 🎧";
  }
});

loadPlaylist();
</script>

</body>
</html>
